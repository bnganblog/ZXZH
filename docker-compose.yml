version: '3.8'

services:
  app:
    build: .
    container_name: zxzh-app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库
      - ./database:/app/database
      # 持久化上传文件
      - ./public/uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - zxzh-network

  # Nginx 反向代理（可选，如需 HTTPS 建议启用）
  nginx:
    image: nginx:alpine
    container_name: zxzh-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - zxzh-network

networks:
  zxzh-network:
    driver: bridge
